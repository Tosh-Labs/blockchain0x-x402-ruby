# Publish `blockchain0x-x402` to rubygems via Trusted Publisher OIDC.
# Manual dispatch only.
#
# Requires rubygems Trusted Publisher binding on
# https://rubygems.org/gems/blockchain0x-x402/trusted_publishers:
#   Provider:          GitHub Actions
#   Owner:             tosh-labs
#   Repository:        blockchain0x-x402-ruby
#   Workflow filename: publish.yml
#   Environment:       rubygems
#
# This file is mirrored from the private monorepo
# `tosh-labs/blockchain0x-app:packages/sdk-ruby-x402/.public-templates/.github/workflows/publish.yml`
# by the `mirror-sdk-ruby-x402` workflow there.

name: publish

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: rubygems
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: build gem
        run: |
          gem build blockchain0x-x402.gemspec
          ls -la blockchain0x-x402-*.gem

      - name: configure rubygems credentials (Trusted Publisher OIDC)
        # Exchange the GitHub OIDC token for a short-lived rubygems publish
        # token via the Trusted Publisher binding on rubygems.org. No
        # RUBYGEMS_API_KEY. Pinned to the SHA that rubygems/release-gem@v1
        # vendors internally.
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa

      - name: push gem to rubygems
        # Use `gem push` directly rather than `rake release`. The mirror
        # workflow already created + pushed the v<version> git tag, so
        # bundler's `rake release` (which re-tags) would collide; and
        # `gem push` needs no Rakefile or rake dev-dependency. The gem was
        # built in the previous step.
        run: gem push blockchain0x-x402-*.gem
